<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大暑交互</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #ffffff;
        --panel: rgba(0, 0, 0, 0.18);
        --line: rgba(255, 255, 255, 0.28);
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background: #050505;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      .page {
        position: relative;
        width: 100vw;
        height: 100svh;
        display: grid;
        place-items: center;
        touch-action: none;
      }

      canvas {
        display: block;
        width: min(100vw, calc(100svh * 0.4719));
        height: min(100svh, calc(100vw / 0.4719));
      }

      .back,
      .gyro-button,
      .term-title {
        position: fixed;
        z-index: 2;
        top: 16px;
        min-height: 42px;
        border: 1px solid var(--line);
        color: var(--ink);
        background: var(--panel);
        backdrop-filter: blur(14px);
      }

      .back {
        left: 16px;
        display: inline-grid;
        place-items: center;
        width: 42px;
        border-radius: 50%;
        text-decoration: none;
      }

      .back svg { width: 19px; height: 19px; }

      .term-title {
        left: 50%;
        display: grid;
        place-items: center;
        min-width: 76px;
        padding: 0 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .gyro-button {
        right: 16px;
        padding: 0 14px;
        border-radius: 999px;
        font: inherit;
        font-size: 12px;
      }
    </style>
  </head>
  <body data-term="dashu">
    <main class="page" id="stage" aria-label="大暑交互">
      <a class="back" href="index.html" aria-label="返回总览">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <div class="term-title" id="termTitle">大暑</div>
      <button class="gyro-button" id="gyroButton" type="button">启用陀螺仪</button>
      <canvas id="canvas" width="470" height="996"></canvas>
    </main>

    <script src="assets/terms-data.js"></script>
    <script src="assets/term-sketch.js"></script>
  </body>
</html>
